name: nawa_app
description: "Nawa - نواة. Your quiet space to think, plan, and create."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  cloudinary_public: ^0.23.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^10.0.0

  connectivity_plus: ^6.0.3
  internet_connection_checker_plus: ^2.4.0

  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  file_picker: ^8.0.5
  video_player: ^2.9.1
  chewie: ^1.8.1
  record: ^5.1.1
  audioplayers: ^6.0.0
  google_mlkit_text_recognition: ^0.13.0
  speech_to_text: ^7.0.0

  dio: ^5.5.0+1
  easy_localization: ^3.0.7+1
  intl: ^0.20.2
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  local_auth: ^2.2.0
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4
  metadata_fetch: ^0.4.2

  encrypt: ^5.0.3
  crypto: ^3.0.3
  logger: ^2.3.0
  google_mobile_ads: ^5.1.0
  table_calendar: ^3.1.2

  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  share_plus: ^10.0.2
  screenshot: ^3.0.0
  gal: ^2.3.0
  pdf: ^3.11.1
  printing: ^5.13.2
  google_generative_ai: ^0.4.6
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1
  image: ^4.2.0

dependency_overrides:
  record_linux: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/screenshots/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#4D9180"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 23
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icons/splash_logo.png"
  color_dark: "#0F1218"
  image_dark: "assets/icons/splash_logo_dark.png"
  android: true
  ios: true
  fullscreen: false
  android_gravity: center
  ios_content_mode: center
  android_12:
    image: "assets/icons/splash_logo.png"
    icon_background_color: "#FFFFFF"
    image_dark: "assets/icons/splash_logo_dark.png"
    icon_background_color_dark: "#0F1218"
